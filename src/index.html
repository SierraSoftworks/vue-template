<!DOCTYPE html>
<html lang="en">

<head>
    <title>vue-template</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/element-ui/2.15.12/theme-chalk/index.css"
        integrity="sha384-pNDXd4WqAVHNRjQ4SMt1XS9Kbh2ZY5TL+AY44eSfqciyXsgmkJeqfWGFM4F5OmIa"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="/index.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="importmap">
    {
        "imports": {
            "vue": "https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.esm.browser.js",
            "vue-router": "https://cdn.jsdelivr.net/npm/vue-router@3.6.5/dist/vue-router.esm.browser.js",
            "vuex": "https://cdn.jsdelivr.net/npm/vuex@3.6.2/dist/vuex.esm.browser.js",
            "vue-class-component": "https://cdn.jsdelivr.net/npm/vue-class-component@7.2.6/dist/vue-class-component.esm.js",
            "dayjs": "https://cdn.jsdelivr.net/npm/dayjs@1.11.21/dayjs.min.js",
            "highlight.js": "https://cdn.jsdelivr.net/npm/highlight.js@11.7.0/es/index.js",
            "highlight-js": "https://cdn.jsdelivr.net/npm/highlight.js@11.7.0/es/index.js",
            "markdown-it": "https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.mjs"
        }
    }
    </script>
</head>

<body>
    <div id="app">
        <el-container class="tac">
            <el-aside width="300px" class="dark side-menu">
                <el-row>
                    <el-col class="sidebar-title" :span="24">
                        <h2>
                            <i class="material-icons">extension</i>
                            vue-template
                        </h2>
                    </el-col>
                </el-row>

                <el-row>
                    <el-col :span="24">
                        <el-menu :router="true" theme="dark">
                            <el-menu-item index="/">
                                <i class="material-icons">home</i>
                                Home
                            </el-menu-item>
                        </el-menu>
                    </el-col>
                </el-row>
            </el-aside>

            <el-main class="vh-full router-view" v-loading.body="loading">
                <router-view :key="$route.fullPath"></router-view>
            </el-main>
        </el-container>

    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/element-ui/2.15.12/index.js"
        integrity="sha384-JI/JVvRgLmTpEgfoIFtmpryx6kwPQ6YS9XQmjbFjQkev6uqyMtg9+bBt6691dzCz"
        crossorigin="anonymous"></script>
    <script type="module" src="/index.js"></script>
</body>

</html>
